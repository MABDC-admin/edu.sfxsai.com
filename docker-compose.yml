version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: teacher_dll
      POSTGRES_USER: dll_user
      POSTGRES_PASSWORD: dll_pass_2024
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - dll_postgres:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dll_user -d teacher_dll"]
      interval: 10s
      timeout: 5s
      retries: 10

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://dll_user:dll_pass_2024@postgres:5432/teacher_dll
      JWT_SECRET: dll-jwt-secret-2024-deped-ph
      NODE_ENV: production
    ports:
      - "0.0.0.0:8095:3000"

volumes:
  dll_postgres:

networks:
  default:
    driver: bridge
    ipam:
      config:
        - subnet: 10.50.0.0/24
