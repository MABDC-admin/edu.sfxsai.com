name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            # Navigate to the project folder
            # NOTE: Please update this directory to match exactly where your project is on the VPS!
            # Example paths where it might be:
            cd ~/edu.sfxsai.com || cd /var/www/edu.sfxsai.com || cd /root/edu.sfxsai.com || echo "Please set the exact path in .github/workflows/deploy.yml"
            
            # Pull the latest changes
            git pull origin main
            
            # Rebuild and restart the frontend
            cd sms-angular-dashboard-starter
            npm install
            npm run build
            cd ..
            
            # Rebuild and restart the backend
            cd sms-nestjs-backend
            npm install
            npm run build
            
            # IMPORTANT: Change this to your actual PM2 restart command or Docker restart command
            pm2 restart all || echo "PM2 restart failed or skipped"
