name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            # Create a temporary directory to clone the repo
            cd /tmp
            rm -rf stfrancis_deploy_tmp
            git clone https://github.com/MABDC-admin/edu.sfxsai.com.git stfrancis_deploy_tmp
            
            # Copy the updated files to the actual project directory
            cp -r stfrancis_deploy_tmp/* /opt/stfrancis-angular/
            
            # Navigate to the project directory
            cd /opt/stfrancis-angular
            
            # Rebuild and restart the Docker containers
            docker compose -f docker-compose.vps.yml build
            docker compose -f docker-compose.vps.yml up -d
            
            # Clean up the temporary folder
            rm -rf /tmp/stfrancis_deploy_tmp
