server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  client_max_body_size 25m;
  add_header Cache-Control "no-store, no-cache, must-revalidate" always;

  location /api/phoenix/ {
    proxy_pass http://178.105.105.92:3018/api/phoenix/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }

  location /quipper/ {
    proxy_pass http://178.105.105.92:8123/quipper/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }

  location ^~ /js/ {
    proxy_pass http://178.105.105.92:8123/js/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }

  location ^~ /css/ {
    proxy_pass http://178.105.105.92:8123/css/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }

  location ^~ /data/ {
    proxy_pass http://178.105.105.92:8123/data/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }

  location = /favicon.svg {
    proxy_pass http://178.105.105.92:8123/favicon.svg;
    proxy_http_version 1.1;
  }

  location /assets/ {
    try_files $uri $uri/ @quipper_assets;
  }

  location @quipper_assets {
    proxy_pass http://178.105.105.92:8123;
  }

  location /api/ {
    proxy_pass http://api:3000/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Authorization $http_authorization;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
  }

  location /storage/ {
    proxy_pass http://api:3000/storage/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Authorization $http_authorization;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
