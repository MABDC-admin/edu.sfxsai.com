<a
  *ngIf="stat.route; else staticCard"
  [routerLink]="stat.route"
  [queryParams]="stat.queryParams"
  class="group block rounded-[1.35rem] border border-slate-200/80 bg-white p-5 shadow-card transition duration-300 hover:-translate-y-0.5 hover:shadow-soft focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-blue-300"
  [attr.aria-label]="'Open ' + stat.title">
  <ng-container *ngTemplateOutlet="cardContent"></ng-container>
</a>

<ng-template #staticCard>
  <article class="group rounded-[1.35rem] border border-slate-200/80 bg-white p-5 shadow-card transition duration-300 hover:-translate-y-0.5 hover:shadow-soft">
    <ng-container *ngTemplateOutlet="cardContent"></ng-container>
  </article>
</ng-template>

<ng-template #cardContent>
  <div class="flex items-center gap-4">
    <div class="grid h-16 w-16 shrink-0 place-items-center rounded-lg" [ngClass]="stat.iconClass">
      <span class="material-icons !text-[2rem]">{{ stat.icon }}</span>
    </div>

    <div class="min-w-0">
      <p class="truncate text-xs font-semibold text-slate-500">{{ stat.title }}</p>
      <h3 class="mt-1 text-2xl font-extrabold tracking-tight text-slate-950">{{ stat.value }}</h3>
      <p class="mt-1 truncate text-sm font-bold" [ngClass]="stat.helperClass || 'text-slate-500'">
        {{ stat.helper }}
      </p>
    </div>
  </div>
</ng-template>
